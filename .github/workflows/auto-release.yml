name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          # marketplace.json에서 버전 읽기
          CURRENT_VERSION=$(cat .claude-plugin/marketplace.json | python3 -c "import sys, json; print(json.load(sys.stdin)['metadata']['version'])")
          # 현재 시간 (YYMMDDHHmm 형식, KST)
          TIMESTAMP=$(TZ='Asia/Seoul' date +%y%m%d%H%M)
          TAG_NAME="v${CURRENT_VERSION}.${TIMESTAMP}"
          echo "version=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Current version: ${TAG_NAME}"

      - name: Generate release notes
        id: notes
        run: |
          # 이전 태그부터 현재까지의 커밋 로그
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          # 릴리스 노트 파일 생성
          cat > release_notes.md << 'HEADER'
          ## Changes
          HEADER
          echo "$COMMITS" >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
